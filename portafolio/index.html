<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Samuel Ulises García Vega</title>
    <link href="https://fonts.googleapis.com/css2?family=Arima+Madurai:wght@400;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red: #9d0000;
            --green: #748251;
            --text-dark: #1a1a1a;
            --text-light: #555555;
            --bg-page: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            background: var(--bg-page); 
            color: var(--text-dark); 
        }
        
        .portfolio-container { 
            display: flex; 
            width: 100vw; 
            height: 100vh; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth;
            scrollbar-width: none; 
        }
        .portfolio-container::-webkit-scrollbar { display: none; }

        section { 
            flex: 0 0 100vw; 
            height: 100vh; 
            display: flex; 
            scroll-snap-align: start; 
            position: relative;
        }
        
        /* --- LÁMINA 1: PORTADA --- */
        .cover-section {
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            background: #ffffff; 
            padding-bottom: 60px; 
        }

        .cover-content { width: 100%; }

        .cover-name {
            text-align: right;
            padding-right: 80px;
            font-size: 2.2rem;
            font-weight: 300;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .cover-line {
            width: 100%;
            height: 3px;
            background-color: var(--red);
        }

        .cover-title {
            text-align: right;
            padding-right: 80px;
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--text-dark);
            letter-spacing: 4px;
            margin-top: 10px;
        }

        /* --- LÁMINA 2: ÍNDICE --- */
        .grid-index-container {
            display: flex;
            width: 100%;
            height: calc(100vh - 80px); 
            background: #ffffff;
        }

        .grid-column {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 80px 40px;
            border-right: 1px solid #eaeaea;
            text-decoration: none; 
            transition: all 0.4s ease;
            position: relative;
        }

        .grid-column:hover { background-color: rgba(116, 130, 81, 0.04); }

        .grid-number {
            font-family: 'Arima Madurai', serif;
            font-size: 6rem;
            color: #e2e8f0; 
            font-weight: 700;
            line-height: 1;
            transition: all 0.4s ease;
        }

        .grid-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s ease;
        }

        .grid-column:hover .grid-number { color: var(--red); transform: translateY(-10px); }
        .grid-column:hover .grid-title { color: var(--green); }

        /* --- LÁMINAS 3 A 7: DISEÑO 50/50 --- */
        .visual-side { 
            width: 50vw; 
            background: #e2e8f0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            padding-bottom: 80px; 
            overflow: hidden; 
        }
        
        .visual-placeholder {
            width: 80%;
            height: 70%;
            border: 2px dashed var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--green);
            font-weight: bold;
            background-color: rgba(116, 130, 81, 0.05);
        }

        /* ESTILOS DEL VISOR 360 */
        .viewer-360 {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            cursor: grab; 
            user-select: none; 
        }
        .viewer-360:active {
            cursor: grabbing; 
        }

        .section-watermark {
            position: absolute;
            bottom: 100px;
            right: 30px;
            font-family: 'Arima Madurai', serif;
            font-size: 4.5rem;
            color: var(--text-dark);
            opacity: 0.08;
            font-weight: 700;
            line-height: 1;
            pointer-events: none; 
        }

            padding: 60px 80px 140px 80px;
